<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque Inter-Universitaire — Réseau Réparti</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">


    <!-- Tailwind (CDN navigateur, comme le reste du projet) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- React 18 + ReactDOM (builds UMD de production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        html, body, #root { height: 100%; }
        body { background: #0f172a; }
        /* Petit spinner de démarrage avant le montage de React */
        .boot { position: fixed; inset: 0; display: flex; align-items: center;
                justify-content: center; color: #94a3b8; font-family: system-ui, sans-serif; }
        .boot .ring { width: 42px; height: 42px; border: 3px solid #334155;
                border-top-color: #38bdf8; border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-full">
    <div id="root">
        <div class="boot"><div class="ring"></div></div>
    </div>

    <!-- Code applicatif React — app.js est compilé depuis app.jsx (voir scripts/build_front.sh) -->
    <script src="/app.js"></script>
</body>
</html>
